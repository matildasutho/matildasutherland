<div class="mllid-video-page">
        
        <div class="mllid-text">
            <h2>My Love Language Is...  <h2 style="text-align: right;"><i>...Digital</i></h2></h2>
            
            <div class="mllid-column">   
            <p>
                With the rise of the digital sphere as a place to seek connection and romantic 
                    relationships and the associated shame we often feel over meeting partners 
                        online, comes the need to dissect the imposed binary of digital vs. IRL 
                            actions of love. There is an opportunity create an installation which 
                                explores what love looks and feels like for each individual, and promotes 
                                    discourse on the topic. My Love Language Is… will include a sonic experience, 
                                        and explore spatiality through installation. The result will be a user imbued 
                                            by inquiry of love, specifically in the context of the digital and IRL romantic 
                                                binary.
                </p>
            </div>
            <div class="mllid-column">
                        <p>
                            This is a 3D mockup of the proposed project. It is a surround sound installation consisting of found sound, recorded 
                                    audio and born-digital instrumentation. This model was constructed using Blender.
        
                        </p>
            </div>
        </div>
